<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Pages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 30px;
            background: #f5f5f5;
        }
        .test-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">🧪 Test Admin Pages - Review & Support System</h1>
        
        <div class="test-card">
            <h3>📊 System Status</h3>
            <div id="systemStatus">
                <div class="spinner-border" role="status"></div>
                <span>Checking...</span>
            </div>
        </div>
        
        <div class="test-card">
            <h3>📝 Review Management API Test</h3>
            <div id="reviewApiStatus">
                <div class="spinner-border" role="status"></div>
                <span>Testing...</span>
            </div>
        </div>
        
        <div class="test-card">
            <h3>🎫 Support Tickets API Test</h3>
            <div id="supportApiStatus">
                <div class="spinner-border" role="status"></div>
                <span>Testing...</span>
            </div>
        </div>
        
        <div class="test-card">
            <h3>🔗 Quick Links</h3>
            <div class="d-flex gap-2 flex-wrap">
                <a href="http://localhost:20080/lequocanh/administrator/" class="btn btn-primary" target="_blank">
                    Admin Login
                </a>
                <a href="http://localhost:20080/lequocanh/administrator/?req=review_management" class="btn btn-info" target="_blank">
                    Review Management
                </a>
                <a href="http://localhost:20080/lequocanh/administrator/?req=support_tickets" class="btn btn-info" target="_blank">
                    Support Tickets
                </a>
                <a href="http://localhost:20080/lequocanh/customer/support.php" class="btn btn-success" target="_blank">
                    User Support Page
                </a>
            </div>
        </div>
        
        <div class="test-card">
            <h3>📋 Test Results Summary</h3>
            <div id="testSummary"></div>
        </div>
    </div>
    
    <script>
        const results = {
            system: null,
            reviewApi: null,
            supportApi: null
        };
        
        // Test system status
        async function testSystem() {
            try {
                const response = await fetch('/lequocanh/api/review_management.php?action=list');
                const httpCode = response.status;
                
                if (httpCode === 403) {
                    results.system = 'success';
                    document.getElementById('systemStatus').innerHTML = `
                        <span class="status-badge status-success">✓ System OK</span>
                        <p class="mt-2 mb-0">API endpoints are responding correctly (403 = requires auth)</p>
                    `;
                } else {
                    results.system = 'error';
                    document.getElementById('systemStatus').innerHTML = `
                        <span class="status-badge status-error">✗ Unexpected Response</span>
                        <p class="mt-2 mb-0">HTTP Code: ${httpCode}</p>
                    `;
                }
            } catch (error) {
                results.system = 'error';
                document.getElementById('systemStatus').innerHTML = `
                    <span class="status-badge status-error">✗ Error</span>
                    <p class="mt-2 mb-0">${error.message}</p>
                `;
            }
            updateSummary();
        }
        
        // Test review API
        async function testReviewApi() {
            try {
                const response = await fetch('/lequocanh/api/review_management.php?action=list');
                const text = await response.text();
                
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    throw new Error('Invalid JSON response');
                }
                
                if (json.success === false && json.error === 'Không có quyền truy cập') {
                    results.reviewApi = 'success';
                    document.getElementById('reviewApiStatus').innerHTML = `
                        <span class="status-badge status-success">✓ API Working</span>
                        <p class="mt-2 mb-0">Returns valid JSON with proper authentication check</p>
                        <pre class="mt-2 p-2 bg-light">${JSON.stringify(json, null, 2)}</pre>
                    `;
                } else {
                    results.reviewApi = 'error';
                    document.getElementById('reviewApiStatus').innerHTML = `
                        <span class="status-badge status-error">✗ Unexpected Response</span>
                        <pre class="mt-2 p-2 bg-light">${JSON.stringify(json, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                results.reviewApi = 'error';
                document.getElementById('reviewApiStatus').innerHTML = `
                    <span class="status-badge status-error">✗ Error</span>
                    <p class="mt-2 mb-0">${error.message}</p>
                `;
            }
            updateSummary();
        }
        
        // Test support API
        async function testSupportApi() {
            try {
                const response = await fetch('/lequocanh/api/support_tickets.php?action=admin_list');
                const text = await response.text();
                
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    throw new Error('Invalid JSON response');
                }
                
                if (json.success === false && json.error === 'Không có quyền truy cập') {
                    results.supportApi = 'success';
                    document.getElementById('supportApiStatus').innerHTML = `
                        <span class="status-badge status-success">✓ API Working</span>
                        <p class="mt-2 mb-0">Returns valid JSON with proper authentication check</p>
                        <pre class="mt-2 p-2 bg-light">${JSON.stringify(json, null, 2)}</pre>
                    `;
                } else {
                    results.supportApi = 'error';
                    document.getElementById('supportApiStatus').innerHTML = `
                        <span class="status-badge status-error">✗ Unexpected Response</span>
                        <pre class="mt-2 p-2 bg-light">${JSON.stringify(json, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                results.supportApi = 'error';
                document.getElementById('supportApiStatus').innerHTML = `
                    <span class="status-badge status-error">✗ Error</span>
                    <p class="mt-2 mb-0">${error.message}</p>
                `;
            }
            updateSummary();
        }
        
        function updateSummary() {
            const total = Object.keys(results).length;
            const completed = Object.values(results).filter(r => r !== null).length;
            const success = Object.values(results).filter(r => r === 'success').length;
            const errors = Object.values(results).filter(r => r === 'error').length;
            
            if (completed === total) {
                document.getElementById('testSummary').innerHTML = `
                    <div class="alert ${errors === 0 ? 'alert-success' : 'alert-warning'}">
                        <h5>Tests Complete: ${success}/${total} Passed</h5>
                        ${errors === 0 ? 
                            '<p class="mb-0">✓ All systems are working correctly!</p>' : 
                            '<p class="mb-0">⚠ Some tests failed. Check details above.</p>'
                        }
                    </div>
                    <div class="mt-3">
                        <h6>Next Steps:</h6>
                        <ol>
                            <li>Login as admin using the "Admin Login" button above</li>
                            <li>Navigate to "Quản lý bình luận" in the left menu</li>
                            <li>Navigate to "Hỗ trợ khách hàng" in the left menu</li>
                            <li>Check that both pages display data correctly</li>
                            <li>If pages are blank, clear browser cache (Ctrl+Shift+Delete)</li>
                        </ol>
                    </div>
                `;
            } else {
                document.getElementById('testSummary').innerHTML = `
                    <div class="spinner-border" role="status"></div>
                    <span>Running tests... ${completed}/${total}</span>
                `;
            }
        }
        
        // Run tests
        testSystem();
        testReviewApi();
        testSupportApi();
    </script>
</body>
</html>
