# Docker Compose Configuration
# Port mapping strategy: Use very high ports (>20000) to avoid ALL Windows conflicts
# Windows dynamically reserves ports, especially in ranges:
# - 2939-3138, 8030-8529, 13000-14944
# SAFEST: Use ports 20000+ (never reserved by Windows)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Remove port mapping since nginx will handle external requests
    # Requests to web service will go through nginx reverse proxy
    # Remove port mapping since nginx will handle external requests
    # Requests to web service will go through nginx reverse proxy
    volumes:
      - .:/var/www/html
      - ./logs:/var/www/html/logs
    environment:
      - APP_ENV=development
      - DB_HOST=mysql
      - DB_DATABASE=sales_management
      - DB_USERNAME=app_user
      - DB_PASSWORD=app_password
      - DB_PORT=3306
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sales_management
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "23306:3306"  # High port - safe
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"  # Very high port
    volumes:
      - redis_data:/data
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"      # Standard HTTP port
      - "443:443"    # Standard HTTPS port
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - .:/var/www/html
      - ./ssl-cert.pem:/etc/nginx/ssl/cert.pem
      - ./ssl-key.pem:/etc/nginx/ssl/key.pem
    depends_on:
      - web
    networks:
      - app-network

  monitoring:
    image: prom/prometheus
    ports:
      - "29090:9090"  # Very high port
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    ports:
      - "23000:3000"  # Very high port
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "28888:80"  # Very high port
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=root
    depends_on:
      - mysql
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:
  grafana_data:

networks:
  app-network:
    driver: bridge
