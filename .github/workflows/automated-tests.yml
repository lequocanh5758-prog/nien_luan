name: Automated Tests and Fixes

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests every day at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Start test environment
      run: |
        docker-compose -f docker-compose.test.yml up -d mysql-test
        sleep 30
    
    - name: Run automated tests
      run: |
        docker-compose -f docker-compose.test.yml up --abort-on-container-exit php-test
    
    - name: Apply auto-fixes
      if: failure()
      run: |
        docker-compose -f docker-compose.test.yml up --abort-on-container-exit auto-fix
    
    - name: Re-run tests after fixes
      if: failure()
      run: |
        docker-compose -f docker-compose.test.yml up --abort-on-container-exit php-test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: test-results/
    
    - name: Stop test environment
      if: always()
      run: |
        docker-compose -f docker-compose.test.yml down -v

  health-check:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Start health monitor
      run: |
        docker-compose -f docker-compose.test.yml up -d mysql-test
        sleep 30
        docker-compose -f docker-compose.test.yml run --rm health-monitor
    
    - name: Upload monitoring results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: monitoring-results
        path: monitoring/
    
    - name: Stop environment
      if: always()
      run: |
        docker-compose -f docker-compose.test.yml down -v

  notify:
    runs-on: ubuntu-latest
    needs: [test, health-check]
    if: failure()
    
    steps:
    - name: Send notification
      run: |
        echo "Tests failed! Check the artifacts for details."
        # Add your notification logic here (Slack, Email, etc.)
